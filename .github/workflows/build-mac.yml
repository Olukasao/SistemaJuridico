name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    name: build-macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            binary_arch: arm64
            python_arch: arm64
            runner: macos-15
          - arch: intel
            binary_arch: x86_64
            python_arch: x64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner info
        run: |
          sw_vers
          uname -m
          sysctl -n machdep.cpu.brand_string

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python_arch }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build app
        run: |
          chmod +x ./build_mac.sh
          ./build_mac.sh

      - name: Smoke test packaged app
        run: |
          test -x dist/AssistenteJuridico.app/Contents/MacOS/AssistenteJuridico
          test -f dist/AssistenteJuridico.app/Contents/Info.plist
          file dist/AssistenteJuridico.app/Contents/MacOS/AssistenteJuridico
          lipo -archs dist/AssistenteJuridico.app/Contents/MacOS/AssistenteJuridico | grep -qw "${{ matrix.binary_arch }}"
          codesign --verify --deep --strict dist/AssistenteJuridico.app
          dist/AssistenteJuridico.app/Contents/MacOS/AssistenteJuridico --self-test
          dist/AssistenteJuridico.app/Contents/MacOS/AssistenteJuridico --ui-smoke-test

      - name: Package app
        run: |
          cd dist
          PACKAGE_DIR="AssistenteJuridico_macOS_${{ matrix.arch }}"
          rm -rf "$PACKAGE_DIR"
          mkdir "$PACKAGE_DIR"
          cp -R AssistenteJuridico.app "$PACKAGE_DIR/"
          cp ../fix_mac_app.sh "$PACKAGE_DIR/"
          chmod +x "$PACKAGE_DIR/fix_mac_app.sh"
          ditto -c -k --sequesterRsrc --keepParent "$PACKAGE_DIR" "AssistenteJuridico_macOS_${{ matrix.arch }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssistenteJuridico_macOS_${{ matrix.arch }}
          path: dist/AssistenteJuridico_macOS_${{ matrix.arch }}.zip
