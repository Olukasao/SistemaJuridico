name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    name: build-macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest
          - arch: intel
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner info
        run: |
          sw_vers
          uname -m

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build app
        run: |
          chmod +x ./build_mac.sh
          ./build_mac.sh

      - name: Smoke test packaged app
        run: |
          test -x dist/AssistenteJuridico.app/Contents/MacOS/AssistenteJuridico
          test -f dist/AssistenteJuridico.app/Contents/Info.plist
          file dist/AssistenteJuridico.app/Contents/MacOS/AssistenteJuridico
          codesign --verify --deep --strict dist/AssistenteJuridico.app
          dist/AssistenteJuridico.app/Contents/MacOS/AssistenteJuridico --self-test

      - name: Package app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent AssistenteJuridico.app AssistenteJuridico_macOS_${{ matrix.arch }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssistenteJuridico_macOS_${{ matrix.arch }}
          path: dist/AssistenteJuridico_macOS_${{ matrix.arch }}.zip
