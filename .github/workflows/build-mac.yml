name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build app
        run: |
          chmod +x ./build_mac.sh
          ./build_mac.sh

      - name: Package app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent AssistenteJuridico.app AssistenteJuridico_macOS.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AssistenteJuridico_macOS
          path: dist/AssistenteJuridico_macOS.zip
